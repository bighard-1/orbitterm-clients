name: Build And Publish Windows Client

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag like v0.1.86 (optional, default reads package.json)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.release_tag }}" -ne "") {
            $tag = "${{ github.event.inputs.release_tag }}"
          } elseif ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "") {
            $tag = "${{ github.ref_name }}"
          } else {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $tag = "v$($pkg.version)"
          }
          "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "release_version=$($tag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Windows package (nsis only)
        shell: pwsh
        run: |
          node scripts/disable-tauri-updater.mjs src-tauri/tauri.conf.json tauri.windows.local.conf.json
          npx tauri build --config tauri.windows.local.conf.json --target x86_64-pc-windows-msvc --bundles nsis
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[WARN] NSIS build failed, fallback to portable build..."
            npx tauri build --config tauri.windows.local.conf.json --target x86_64-pc-windows-msvc --no-bundle
            if ($LASTEXITCODE -ne 0) {
              throw "Portable fallback build failed."
            }
            $exePath = "src-tauri/target/x86_64-pc-windows-msvc/release/OrbitTerm.exe"
            if (-not (Test-Path $exePath)) {
              throw "Portable exe not found at $exePath"
            }
            $portableDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/portable"
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            $portableZip = Join-Path $portableDir "OrbitTerm_${{ steps.meta.outputs.release_version }}_x64_portable.zip"
            if (Test-Path $portableZip) { Remove-Item $portableZip -Force }
            Compress-Archive -Path $exePath -DestinationPath $portableZip -CompressionLevel Optimal
          }

      - name: Inspect Windows bundle output
        shell: pwsh
        run: |
          Write-Host "=== Bundle directory tree ==="
          Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            if (-not $_.PSIsContainer) {
              Write-Host $_.FullName
            }
          }

      - name: Publish into releases folder
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_REPO: ${{ github.repository }}
        run: node scripts/publish-windows-release.mjs

      - name: Commit and push release files
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/latest.json releases/${{ steps.meta.outputs.release_tag }}
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "release(windows): publish ${{ steps.meta.outputs.release_tag }} from actions"
          git push origin HEAD:main
