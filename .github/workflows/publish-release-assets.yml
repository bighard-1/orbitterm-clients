name: Publish Client Release Assets

on:
  push:
    branches: [main]
    paths:
      - 'releases/latest.json'
      - 'releases/v*/**'
      - '.github/workflows/publish-release-assets.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read release metadata
        id: meta
        run: |
          VERSION="$(jq -r '.version' releases/latest.json)"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Invalid version in releases/latest.json"
            exit 1
          fi
          DIR="releases/${VERSION}"
          if [ ! -d "$DIR" ]; then
            echo "Release directory not found: $DIR"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Ensure git tag exists
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
          else
            git tag "$VERSION" "$GITHUB_SHA"
            git push origin "$VERSION"
          fi

      - name: Publish / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          target_commitish: main
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.dir }}/OrbitTerm_*_x64-setup.exe
            ${{ steps.meta.outputs.dir }}/OrbitTerm_*_x64_en-US.msi
            ${{ steps.meta.outputs.dir }}/SHA256SUMS.windows.txt
            ${{ steps.meta.outputs.dir }}/release-manifest.json
